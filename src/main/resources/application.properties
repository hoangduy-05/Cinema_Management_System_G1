spring.application.name=cinema-management

spring.datasource.url=jdbc:mysql://localhost:3306/cinema_management?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Bangkok
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

booking.hold-duration-minutes=${BOOKING_HOLD_DURATION_MINUTES:10}
booking.payment-timeout-minutes=${BOOKING_PAYMENT_TIMEOUT_MINUTES:10}
booking.expiration-scan-fixed-delay-ms=${BOOKING_EXPIRATION_SCAN_FIXED_DELAY_MS:30000}
booking.completion-scan-fixed-delay-ms=${BOOKING_COMPLETION_SCAN_FIXED_DELAY_MS:60000}
booking.expiration-batch-size=${BOOKING_EXPIRATION_BATCH_SIZE:100}
booking.payment.simulation-token=${BOOKING_PAYMENT_SIMULATION_TOKEN:}
